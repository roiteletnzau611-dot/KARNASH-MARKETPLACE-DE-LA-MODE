<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Boutiques</title>
    <style>
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
        .store-card { border: 1px solid #ddd; padding: 15px; border-radius: 10px; text-align: center; }
        .btn { display: inline-block; margin-top: 10px; padding: 8px 12px; background: #6a2b83; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="storesGrid" class="grid"></div>

    <script type="module">
        // Remplace par tes vrais imports de configuration
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

        const firebaseConfig = { /* TON OBJET CONFIG ICI */ };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const grid = document.getElementById('storesGrid');

        onValue(ref(db, 'boutiques/'), (snapshot) => {
            const data = snapshot.val();
            grid.innerHTML = ""; // Vider la liste avant d'afficher
            
            if (data) {
                Object.keys(data).forEach(id => {
                    // On n'affiche que les boutiques actives
                    if (data[id].statut === "active") {
                        grid.innerHTML += `
                            <div class="store-card">
                                <h3>${data[id].nom}</h3>
                                <a href="details-boutique.html?boutiqueId=${id}" class="btn">Voir les articles</a>
                            </div>`;
                    }
                });
            }
        });
    </script>
</body>
</html>
