<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription Client</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#6a2b83,#3d1a4d);
}

.form{
width:380px;
padding:35px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(15px);
border-radius:25px;
box-shadow:0 15px 35px rgba(0,0,0,.4);
color:white;
}

h2{
text-align:center;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border:none;
border-radius:12px;
outline:none;
font-size:16px;
}

button{
width:100%;
padding:14px;
margin-top:15px;
background:#ffffff;
color:#6a2b83;
border:none;
border-radius:30px;
font-weight:bold;
font-size:17px;
cursor:pointer;
}

button:hover{
transform:scale(1.05);
}

a{
display:block;
text-align:center;
margin-top:20px;
color:white;
text-decoration:none;
}

</style>

</head>

<body>

<div class="form">

<h2>👤 Inscription Client</h2>

<input type="text" placeholder="Nom complet">

<input type="email" placeholder="Adresse e-mail">

<input type="password" placeholder="Mot de passe">

<input type="password" placeholder="Confirmer le mot de passe">

<button>S'inscrire</button>

<a href="index.html">⬅ Retour</a>

</div>

</body>
</html>
