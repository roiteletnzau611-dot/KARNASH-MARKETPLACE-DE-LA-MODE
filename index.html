<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vogue Marketplace</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #6a2b83, #3d1a4d);
            color: white;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            width: 320px;
            backdrop-filter: blur(10px);
        }
        .logo { width: 120px; margin-bottom: 20px; }
        .nav-container { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .btn {
            padding: 12px;
            background: white;
            color: #6a2b83;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover { background: #f1f1f1; transform: scale(1.05); }
        h1 { margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <img src="logo.png" alt="Logo" class="logo">
        <h1>Vogue Marketplace</h1>
        <p>Bienvenue sur votre plateforme</p>
        
        <div class="nav-container">
            <a href="inscription-client.html" class="btn">Inscription Client</a>
            <a href="inscription-vendeur.html" class="btn">Inscription Vendeur</a>
            <a href="connexion.html" class="btn">Connexion</a>
            <a href="connexion-admin.html" class="btn" style="background:#e74c3c; color:white;">Accès Admin</a>
        </div>
    </div>

</body>
</html>
