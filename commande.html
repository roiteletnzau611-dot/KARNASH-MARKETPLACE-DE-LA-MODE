<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Commander</title>
</head>
<body>
    <h2 id="articleChoisi">Chargement...</h2>
    <p id="prixTotal"></p>

    <form id="formCommande">
        <input type="text" placeholder="Votre Nom" required><br>
        <input type="text" placeholder="Votre Adresse" required><br>
        <button type="submit">Confirmer la commande</button>
    </form>

    <script>
        const params = new URLSearchParams(window.location.search);
        document.getElementById('articleChoisi').innerText = "Commande : " + params.get('nom');
        document.getElementById('prixTotal').innerText = "Prix : " + params.get('prix') + " $";

        document.getElementById('formCommande').addEventListener('submit', (e) => {
            e.preventDefault();
            alert("Commande envoyée avec succès !");
            window.location.href = "index.html";
        });
    </script>
</body>
</html>
