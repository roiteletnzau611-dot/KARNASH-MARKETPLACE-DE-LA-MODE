<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un Compte Admin | Karnash Admin System</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #1a0933;   
            --accent-purple: #6a2b83;  
            --accent-gold: #cca43b;    
            --bg-light: #f4f3f6;       
            --text-dark: #2d2438;      
            --text-muted: #796e85;     
            --white: #ffffff;
            --shadow: 0 4px 12px rgba(26, 9, 51, 0.05);
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-light); color: var(--text-dark); display: flex; }
        a { text-decoration: none; }

        /* --- SIDEBAR PRIVÉE ADMIN --- */
        .sidebar {
            width: 280px; height: 100vh; background-color: var(--primary-color);
            color: var(--white); padding: 25px 20px; position: fixed; top: 0; left: 0;
            border-right: 3px solid var(--accent-gold);
        }
        .sidebar-brand { display: flex; align-items: center; gap: 8px; margin-bottom: 40px; }
        .sidebar-brand h2 { font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
        .sidebar-brand h2 span { color: var(--accent-gold); }

        .menu-links { list-style: none; }
        .menu-links li { margin-bottom: 8px; }
        .menu-links a {
            display: flex; align-items: center; gap: 15px; padding: 12px 15px;
            color: #d1c9dc; border-radius: 8px; font-size: 14px; font-weight: 500;
            transition: var(--transition);
        }
        .menu-links a:hover, .menu-links a.active {
            background-color: var(--accent-purple); color: var(--white);
        }
        .admin-badge {
            background-color: var(--accent-gold); color: var(--primary-color);
            font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 50px;
            text-transform: uppercase; margin-left: auto;
        }

        /* --- MAIN CONTENT --- */
        .main-content { flex: 1; margin-left: 280px; padding: 40px; }
        
        .header-dash { margin-bottom: 35px; display: flex; align-items: center; gap: 20px; }
        .btn-back {
            background-color: var(--white); color: var(--primary-color); width: 40px; height: 40px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: var(--shadow); transition: var(--transition); font-size: 14px;
        }
        .btn-back:hover { color: var(--accent-purple); transform: translateX(-3px); }
        .header-dash h1 { font-size: 24px; font-weight: 800; color: var(--primary-color); }

        /* --- FORM BOX --- */
        .form-box {
            background-color: var(--white); max-width: 600px; padding: 35px;
            border-radius: 12px; box-shadow: var(--shadow); border: 1px solid rgba(106, 43, 131, 0.05);
        }
        
        .form-group { margin-bottom: 22px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 600; color: var(--primary-color); }
        
        .form-control { width: 100%; padding: 12px 15px; border: 1px solid #e2daf0; border-radius: 8px; font-size: 14px; background-color: #faf9fc; transition: var(--transition); }
        .form-control:focus { outline: none; border-color: var(--accent-purple); background-color: var(--white); }
        
        .form-row { display: flex; gap: 20px; }
        .form-row .form-group { flex: 1; }

        /* Button styled */
        .btn-register {
            background: linear-gradient(135deg, var(--accent-purple), #4a1c5c); color: var(--white);
            padding: 14px 35px; border: none; border-radius: 50px; font-weight: 600; font-size: 14px;
            cursor: pointer; transition: var(--transition); box-shadow: 0 4px 15px rgba(106, 43, 131, 0.3);
            display: inline-flex; align-items: center; gap: 10px;
        }
        .btn-register:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(106, 43, 131, 0.5); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-brand">
            <h2>Karnash<span>.Admin</span></h2>
            <span class="admin-badge">Super</span>
        </div>
        <ul class="menu-links">
            <li><a href="dashboard.html"><i class="fa-solid fa-gauge-high"></i> Vue d'ensemble</a></li>
            <li><a href="#"><i class="fa-solid fa-store"></i> Valider Boutiques</a></li>
            <li><a href="#"><i class="fa-solid fa-users"></i> Utilisateurs</a></li>
            <li><a href="#"><i class="fa-solid fa-chart-line"></i> Flux Financier</a></li>
            <li><a href="#"><i class="fa-solid fa-shield-halved"></i> Sécurité API</a></li>
            <li style="margin-top: 60px;"><a href="../index.html" style="color: #ff4757;"><i class="fa-solid fa-lock"></i> Déconnexion</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="header-dash">
            <a href="dashboard.html" class="btn-back" title="Retour au tableau de bord"><i class="fa-solid fa-arrow-left"></i></a>
            <div>
                <h1>Ajouter un membre à l'équipe Admin</h1>
                <p style="color: var(--text-muted); font-size: 13px;">Créez un accès sécurisé pour un nouveau gestionnaire du système.</p>
            </div>
        </div>

        <div class="form-box">
            <form>
                <div class="form-row">
                    <div class="form-group">
                        <label for="admin-firstname">Prénom</label>
                        <input type="text" id="admin-firstname" class="form-control" placeholder="Ex: Trésor" required>
                    </div>
                    <div class="form-group">
                        <label for="admin-lastname">Nom</label>
                        <input type="text" id="admin-lastname" class="form-control" placeholder="Ex: Kapuku" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="admin-email">Adresse Émail Professionnelle</label>
                    <input type="email" id="admin-email" class="form-control" placeholder="Ex: t.kapuku@karnash.com" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="admin-password">Mot de passe temporaire</label>
                        <input type="password" id="admin-password" class="form-control" placeholder="••••••••" required>
                    </div>
                    <div class="form-group">
                        <label for="admin-role">Niveau d'accréditation (Rôle)</label>
                        <select id="admin-role" class="form-control">
                            <option value="moderator">🛡️ Modérateur (Boutiques & Avis)</option>
                            <option value="sysadmin">💻 Administrateur Système (Complet)</option>
                        </select>
                    </div>
                </div>

                <div style="text-align: right; margin-top: 15px;">
                    <button type="submit" class="btn-register">
                        <i class="fa-solid fa-user-shield"></i> Enregistrer l'administrateur
                    </button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
