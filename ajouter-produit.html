<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter un Produit | Karnash Marketplace</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #1a0933;   
            --accent-purple: #6a2b83;  
            --accent-gold: #cca43b;    
            --bg-light: #f4f3f6;       
            --text-dark: #2d2438;      
            --text-muted: #796e85;     
            --white: #ffffff;
            --shadow: 0 4px 12px rgba(26, 9, 51, 0.05);
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-light); color: var(--text-dark); display: flex; }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px; height: 100vh; background-color: var(--primary-color);
            color: var(--white); padding: 25px 20px; position: fixed; top: 0; left: 0;
        }
        .sidebar-brand { display: flex; align-items: center; gap: 8px; margin-bottom: 40px; }
        .sidebar-brand img { height: 28px; }
        .sidebar-brand h2 { font-size: 14px; font-weight: 800; text-transform: uppercase; }
        .sidebar-brand h2 span { color: var(--accent-gold); }

        .menu-links { list-style: none; }
        .menu-links li { margin-bottom: 8px; }
        .menu-links a {
            display: flex; align-items: center; gap: 15px; padding: 12px 15px;
            color: #d1c9dc; border-radius: 8px; font-size: 14px; font-weight: 500; text-decoration: none;
            transition: var(--transition);
        }
        .menu-links a:hover, .menu-links a.active {
            background-color: var(--accent-purple); color: var(--white);
        }

        /* --- MAIN CONTENT --- */
        .main-content { flex: 1; margin-left: 260px; padding: 40px; }
        
        .header-dash { margin-bottom: 30px; }
        .header-dash h1 { font-size: 24px; font-weight: 700; color: var(--primary-color); }

        /* --- FORM GRID --- */
        .form-container {
            background-color: var(--white); padding: 35px; border-radius: 12px;
            box-shadow: var(--shadow); border: 1px solid rgba(106, 43, 131, 0.05);
            display: flex; gap: 40px; flex-wrap: wrap;
        }

        .form-upload-section { flex: 1; min-width: 280px; }
        .form-fields-section { flex: 2; min-width: 350px; }

        /* Zone de téléchargement image */
        .image-upload-box {
            border: 2px dashed #e2daf0; border-radius: 12px; height: 320px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--text-muted); cursor: pointer; background-color: #faf9fc;
            transition: var(--transition); text-align: center; padding: 20px;
        }
        .image-upload-box:hover { border-color: var(--accent-purple); background-color: var(--white); }
        .image-upload-box i { font-size: 40px; color: var(--accent-purple); margin-bottom: 15px; }

        /* Champs classiques */
        .form-row { display: flex; gap: 20px; margin-bottom: 20px; }
        .form-group { flex: 1; margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 600; color: var(--primary-color); }
        
        .form-control { width: 100%; padding: 12px; border: 1px solid #e2daf0; border-radius: 8px; font-size: 14px; background-color: #faf9fc; transition: var(--transition); }
        .form-control:focus { outline: none; border-color: var(--accent-purple); background-color: var(--white); }
        
        textarea.form-control { height: 120px; resize: none; }

        /* Bouton de validation */
        .btn-submit {
            background: linear-gradient(135deg, var(--accent-purple), #4a1c5c); color: var(--white);
            padding: 14px 40px; border: none; border-radius: 50px; font-weight: 600; font-size: 15px;
            cursor: pointer; transition: var(--transition); box-shadow: 0 4px 15px rgba(106, 43, 131, 0.3);
            display: inline-flex; align-items: center; gap: 10px;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(106, 43, 131, 0.5); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-brand">
            <img src="../logo.png" alt="Logo" onerror="this.style.display='none';">
            <h2>Karnash<span>.Mode</span></h2>
        </div>
        <ul class="menu-links">
            <li><a href="dashboard.html"><i class="fa-solid fa-chart-pie"></i> Tableau de bord</a></li>
            <li><a href="#" class="active"><i class="fa-solid fa-box"></i> Mes Produits</a></li>
            <li><a href="#"><i class="fa-solid fa-receipt"></i> Commandes</a></li>
            <li><a href="#"><i class="fa-solid fa-gear"></i> Réglages Boutique</a></li>
            <li style="margin-top: 40px;"><a href="../index.html" style="color: #ff4757;"><i class="fa-solid fa-arrow-right-from-bracket"></i> Quitter</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="header-dash">
            <h1>Ajouter un nouvel article</h1>
            <p style="color: var(--text-muted); font-size: 13px;">Remplissez les détails pour publier un produit sur le catalogue.</p>
        </div>

        <form class="form-container">
            <div class="form-upload-section">
                <div class="form-group">
                    <label>Image de l'article</label>
                    <div class="image-upload-box">
                        <i class="fa-regular fa-image"></i>
                        <p style="font-weight: 500; font-size: 14px;">Glissez votre image ici</p>
                        <p style="font-size: 12px; margin-top: 5px;">Format recommandé : JPG, PNG (Max 5Mo)</p>
                    </div>
                </div>
            </div>

            <div class="form-fields-section">
                <div class="form-group">
                    <label for="prod-name">Nom du produit</label>
                    <input type="text" id="prod-name" class="form-control" placeholder="Ex: Chaussure Richelieu en cuir véritable" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="prod-price">Prix (en USD $)</label>
                        <input type="number" id="prod-price" class="form-control" placeholder="Ex: 85" required>
                    </div>
                    <div class="form-group">
                        <label for="prod-category">Catégorie</label>
                        <select id="prod-category" class="form-control">
                            <option>👞 Chaussures</option>
                            <option>👗 Robes & Vêtements</option>
                            <option>👜 Sacs & Maroquinerie</option>
                            <option>⌚ Accessoires & Montres</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="prod-desc">Description de l'article</label>
                    <textarea id="prod-desc" class="form-control" placeholder="Décrivez la matière, les tailles disponibles, les coloris..." required></textarea>
                </div>

                <div style="text-align: right; margin-top: 10px;">
                    <button type="submit" class="btn-submit">
                        <i class="fa-solid fa-plus"></i> Mettre en ligne l'article
                    </button>
                </div>
            </div>
        </form>
    </div>

</body>
</html>
