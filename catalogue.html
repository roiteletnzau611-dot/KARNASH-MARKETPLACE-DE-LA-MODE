<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Catalogue</title>
    <style>
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .store-card { border: 1px solid #ccc; padding: 15px; border-radius: 10px; }
    </style>
</head>
<body>
    <h1>Nos Boutiques</h1>
    <div id="storesGrid" class="grid"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

        const app = initializeApp({ /* ta config */ });
        const db = getDatabase(app);
        const productsRef = ref(db, 'globalProducts/');

        onValue(productsRef, (snapshot) => {
            const data = snapshot.val();
            const grid = document.getElementById('storesGrid');
            grid.innerHTML = "";
            if (data) {
                Object.keys(data).forEach(id => {
                    const item = data[id];
                    grid.innerHTML += `
                        <div class="store-card">
                            <img src="${item.image || 'https://via.placeholder.com/150'}" width="100%">
                            <h3>${item.nom || "Produit"}</h3>
                            <p>${item.prix || 0} $</p>
                            <a href="boutique-client.html?id=${id}">Voir détails</a>
                        </div>`;
                });
            }
        });
    </script>
</body>
</html>
